<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>课堂</title>
	<link href="00-practice.css" rel="stylesheet">

</head>
<body>
<div class="page">
	<div class="pageheader">
		<div class="logo">
			<img alt="logo" src="../../资源文件/flex布局练习图片/logo.png">
		</div>
		<div class="btn_list">
			<button>国内校区</button>
			<button>缅甸校区</button>
			<button>非洲校区</button>
			<button>美国校区</button>
		</div>
	</div>

	<div class="content">
		<div class="email">
			<img alt="我的邮箱" src="../../资源文件/flex布局练习图片/item1.png">
			<span>我的邮箱</span>
		</div>
		<div class="cloud">
			<img alt="云服务" src="../../资源文件/flex布局练习图片/item2.png">
			<span>云服务</span>
		</div>
		<div class="phone">
			<img alt="手机课堂" src="../../资源文件/flex布局练习图片/item3.png">
			<span>手机课堂</span>
		</div>
		<div class="wechat">
			<img alt="微信服务" src="../../资源文件/flex布局练习图片/item4.png">
			<span>微信服务</span>
		</div>
		<div class="custService">
			<img alt="在线客服" src="../../资源文件/flex布局练习图片/item5.png">
			<span>在线客服</span>
		</div>
	</div>
</div>

</body>
</html>
