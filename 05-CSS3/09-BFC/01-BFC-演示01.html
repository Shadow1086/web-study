<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		*{
            padding: 0;
            margin: 0;
		}
        .outer {
            width: 400px;
            background-color: #888888;
	        float: left;
        }

        .inner {
            width: 100px;
            height: 100px;
	        margin: 20px;
        }

        .inner1 {
            background-color: orange;
        }

        .inner2 {
            background-color: skyblue;
        }

        .inner3 {
            background-color: green;
        }
	</style>
</head>
<body>
<div class="outer">
	<div class="inner inner1"></div>
	<div class="inner inner2"></div>
	<div class="inner inner3"></div>
</div>
</body>
</html>
